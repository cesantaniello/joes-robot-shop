<div class="container">
  <form class="form" (ngSubmit)="signIn()">
    <img class="logo" src="/assets/images/logo.png" />
    <div class="sign-in">Sign In</div>
    <div class="sub-text">to acquire awesome bots</div>
    <input name="email" required email placeholder="Email Address" type="text" />
    <em class="error">Email is required</em>
    <em class="error">Please enter a valid email address</em>
    <input name="password" required placeholder="Password" type="password" />
    <em class="error">Password is required</em>
    <div class="buttons">
      <button type="submit" class="button cta">
        Sign In
      </button>
    </div>
      <div class="signInError" *ngIf="signInError">
        Invalid email or password.
      </div>
  </form>
</div>
